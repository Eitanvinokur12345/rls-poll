<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>חזו את הממצאים — גרסה A</title>
<style>
  :root{
    --bg:#241812; --bg2:#2e1f15; --card:#3A2A1E; --border:#5A4636;
    --ink:#FBF1E6; --mut:#C9B49E; --acc:#D98A4E; --acc2:#E8A66A; --gold:#FCD34D;
    --green:#7DB892;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Heebo","Segoe UI",system-ui,Arial,sans-serif;color:var(--ink);min-height:100%;
    background:radial-gradient(1200px 800px at 30% -10%, #3a2415 0%, var(--bg) 60%);
    display:flex;align-items:center;justify-content:center;padding:20px;direction:rtl;
  }
  .wrap{width:min(680px,100%)}
  .card{
    background:linear-gradient(180deg,var(--card),#2a1c12);
    border:1.5px solid var(--border);border-radius:22px;padding:34px 28px;
    box-shadow:0 30px 80px rgba(0,0,0,.45);position:relative;overflow:hidden;min-height:480px;
    display:flex;flex-direction:column;justify-content:center;
  }
  .card::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;
    background:linear-gradient(90deg,var(--acc),var(--acc2),var(--gold))}
  .group-name{font-size:11px;letter-spacing:3px;color:var(--mut);font-weight:700;text-align:center;margin-bottom:8px}
  .dots{display:flex;gap:8px;justify-content:center;margin-bottom:22px;direction:ltr}
  .dot{width:9px;height:9px;border-radius:50%;background:#4d3a2a;transition:.3s}
  .dot.on{background:var(--acc);transform:scale(1.3)}
  .dot.done{background:var(--gold)}
  .eyebrow{font-size:12px;letter-spacing:2px;color:var(--acc);font-weight:800;text-align:center;margin-bottom:10px}
  h1{font-size:30px;font-weight:900;line-height:1.25;text-align:center;margin-bottom:10px}
  .sub{color:var(--mut);text-align:center;font-size:16px;margin-bottom:24px;line-height:1.55}
  .q{font-size:26px;font-weight:800;line-height:1.3;text-align:center;margin:12px 0 26px}
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{
    background:#2a1c12;border:1.5px solid var(--border);border-radius:14px;
    padding:17px 18px;font-size:16.5px;color:var(--ink);text-align:right;cursor:pointer;
    transition:.18s;display:flex;align-items:center;gap:12px;font-weight:600;font-family:inherit;
  }
  .opt:hover{border-color:var(--acc);transform:translateY(-2px);background:#3a2818}
  .opt .pill{width:30px;height:30px;border-radius:50%;border:2px solid var(--mut);flex:0 0 auto;
    display:grid;place-items:center;font-size:14px;color:var(--mut);font-weight:800}
  .btn{margin-top:26px;background:var(--acc);color:#1a0e07;border:none;border-radius:14px;
    padding:16px 30px;font-size:17px;font-weight:800;cursor:pointer;transition:.18s;width:100%;font-family:inherit;}
  .btn:hover{filter:brightness(1.08);transform:translateY(-2px)}
  .btn.ghost{background:transparent;color:var(--acc);border:1.5px solid var(--acc)}
  /* spinner */
  .spinner-wrap{text-align:center;padding:30px 0}
  .spinner{
    width:90px;height:90px;margin:0 auto 26px;border-radius:50%;
    border:6px solid var(--border);border-top-color:var(--acc);
    animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner-text{font-size:21px;font-weight:800;color:var(--ink)}
  .spinner-sub{font-size:14px;color:var(--mut);margin-top:8px}
  /* tease */
  .tease{padding:8px 0}
  .tease-tag{font-size:12px;letter-spacing:2px;color:var(--acc);font-weight:800;text-align:center;margin-bottom:14px}
  .tease-headline{font-size:23px;font-weight:900;line-height:1.35;text-align:center;margin-bottom:18px;color:var(--ink)}
  .tease-line{background:#3a2818;border:1px solid var(--border);border-right:4px solid var(--gold);
    border-radius:12px;padding:16px 18px;font-size:15.5px;line-height:1.55;text-align:right;margin:10px 0}
  .tease-line b{color:var(--acc)}
  .you-pick{font-size:13.5px;color:var(--mut);text-align:center;margin-top:14px}
  .you-pick b{color:var(--acc)}
  .fade{animation:fade .5s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .credit{text-align:center;color:var(--mut);font-size:12px;margin-top:18px;line-height:1.6}
  .reveal-big{font-size:20px;font-weight:900;color:var(--gold);text-align:center;padding:14px 0}
</style>
</head>
<body>
<div class="wrap"><div class="card" id="card"></div></div>
<script>
const GROUP = "פרויקט NAMELESS  ·  אחרייטק 2026";

const QUESTIONS = [
  {
    q: "מה לדעתכם מנבא הכי הרבה את האושר בזוגיות?",
    options: ["אהבה","כסף","אמונה משותפת","בריאות"],
    popular: "אמונה משותפת",
    teaseHeadline: "רוב האנשים מהמרים על אהבה. החוקרים מצאו שם אחר.",
    teaseLine: "גם במחקר Pew של <b>36,908 אמריקאים</b> — אמונה משותפת מובילה בפער מפתיע. <b>הפער המלא יוצג במצגת.</b>"
  },
  {
    q: "האם כסף קונה שלווה פנימית?",
    options: ["כן — יותר כסף = יותר שלווה","לא — שלווה לא תלויה בכסף","לא בטוח/ה"],
    popular: "לא",
    teaseHeadline: "רוב האנשים אומרים 'לא'. הם צודקים — אבל באופן שיפתיע.",
    teaseLine: "במחקר Pew: כסף מעלה אושר ובריאות אבל לא מזיז את השלווה הפנימית כלל. <b>הנתון המדויק במצגת.</b>"
  },
  {
    q: "איזו דת לדעתכם מדווחת על הכי הרבה שלווה פנימית?",
    options: ["יהדות","אסלאם","נצרות","מורמונים","חסרי דת"],
    popular: "מורמונים",
    teaseHeadline: "התשובה תפתיע — שתי קבוצות מובילות בפער ניכר.",
    teaseLine: "במחקר Pew: שתי קבוצות לא צפויות לוקחות את הראש, ואחת מובילה בתחתית. <b>הדירוג המלא במצגת.</b>"
  },
  {
    q: "מי לדעתכם מאושר יותר היום — דור צעיר או מבוגר?",
    options: ["דור צעיר (Gen Z, מילניאלס)","דור מבוגר (בייבי בומרס, השקט)"],
    popular: "מבוגר",
    teaseHeadline: "התשובה לא חד-משמעית. כל דור מצא מסלול אחר.",
    teaseLine: "במחקר Pew: דור אחד מוביל באושר ובשלווה, אבל דור אחר מוביל בשביעות רצון. <b>ההפרדה במצגת.</b>"
  },
  {
    q: "כששני בני הזוג דתיים מאוד, השלווה הפנימית שלהם...",
    options: ["גבוהה הרבה יותר","בערך אותו דבר","נמוכה יותר"],
    popular: "גבוהה הרבה יותר",
    teaseHeadline: "רוב מנחשים נכון. אבל לא מעריכים כמה גדול הפער באמת.",
    teaseLine: "במחקר Pew: הפער בין 'שניהם דתיים' ל'שניהם חילוניים' הוא <b>הפער הגדול במחקר כולו.</b> הנתון במצגת."
  },
  {
    q: "איזה ממצא ירשים אתכם הכי הרבה?",
    options: ["שדמיון דתי כל כך משפיע","שכסף לא קונה שלווה","שני המאמינים בראש הרווחה","ההבדלים בין דורות"],
    popular: "דמיון דתי",
    teaseHeadline: "כל ארבעת הממצאים מובילים לאותו סיפור.",
    teaseLine: "במחקר Pew: <b>אחד מהממצאים האלה גדול ב-4 מהשני.</b> נחשוף אותו במצגת ונראה למה זה משנה."
  }
];

let qi = -1;
let lastChoice = null;
const card = document.getElementById('card');

function dots(active){
  let h='<div class="dots">';
  for(let i=0;i<QUESTIONS.length;i++){
    let cls = i<active ? 'done' : (i===active ? 'on' : '');
    h+=`<div class="dot ${cls}"></div>`;
  }
  return h+'</div>';
}

function intro(){
  card.innerHTML = `
    <div class="group-name fade">${GROUP}</div>
    ${dots(-1)}
    <div class="eyebrow fade">PEW RESEARCH · 36,908 נשאלים</div>
    <h1 class="fade">חזו את הממצאים</h1>
    <p class="sub fade">6 שאלות. בכל אחת תנחשו מה החוקרים מצאו. התוצאות המלאות יוצגו במצגת בהמשך.</p>
    <button class="btn fade" onclick="next()">בואו נתחיל</button>
    <div class="credit">פרויקט NAMELESS · תחרות מדעי הנתונים 2026</div>
  `;
}

function question(){
  const Q = QUESTIONS[qi];
  let opts = Q.options.map((o,i)=>`
    <button class="opt" onclick="answer(${i})">
      <span class="pill">${["א","ב","ג","ד","ה"][i]}</span>${o}
    </button>`).join('');
  card.innerHTML = `
    <div class="group-name fade">${GROUP}</div>
    ${dots(qi)}
    <div class="eyebrow fade">שאלה ${qi+1} מתוך ${QUESTIONS.length}</div>
    <div class="q fade">${Q.q}</div>
    <div class="opts fade">${opts}</div>
  `;
}

function spinner(){
  card.innerHTML = `
    <div class="group-name">${GROUP}</div>
    ${dots(qi+1)}
    <div class="spinner-wrap fade">
      <div class="spinner"></div>
      <div class="spinner-text">רגע, ממתינים לשאר המשתתפים...</div>
      <div class="spinner-sub">אוסף תשובות מכל החדר</div>
    </div>
  `;
  setTimeout(tease, 2800);
}

function tease(){
  const Q = QUESTIONS[qi];
  const last = qi === QUESTIONS.length-1;
  card.innerHTML = `
    <div class="group-name fade">${GROUP}</div>
    ${dots(qi+1)}
    <div class="tease-tag fade">תוצאה ראשונית</div>
    <div class="tease-headline fade">${Q.teaseHeadline}</div>
    <div class="tease-line fade">${Q.teaseLine}</div>
    <div class="reveal-big fade">📊 התשובה המלאה במצגת</div>
    <div class="you-pick fade">בחירתך: <b>${Q.options[lastChoice]}</b></div>
    <button class="btn fade" onclick="next()">${last ? 'לסיום' : 'שאלה הבאה'}</button>
  `;
}

function answer(choiceIdx){
  lastChoice = choiceIdx;
  spinner();
}

function final(){
  card.innerHTML = `
    <div class="group-name fade">${GROUP}</div>
    ${dots(QUESTIONS.length)}
    <div class="eyebrow fade">תודה רבה</div>
    <h1 class="fade" style="font-size:28px">התשובות שלכם נרשמו</h1>
    <p class="sub fade" style="margin-top:14px">עכשיו תקשיבו למצגת — נחשוף את הממצאים האמיתיים מתוך 36,908 נסקרים, ונראה את ההפתעות הגדולות של המחקר.</p>
    <div class="tease-line fade" style="text-align:center;border-right:none;border-top:4px solid var(--gold)">
      ✨ <b>טיפ:</b> כל ממצא שתראו במצגת כבר השאיר את הסקרים האחרים בהלם.
    </div>
    <button class="btn ghost fade" onclick="qi=-1;next()">לסקר נוסף</button>
    <div class="credit">Pew Religious Landscape Study 2023 to 2024<br>n = 36,908 · ממוצעים משוקללים</div>
  `;
}

function next(){
  qi++;
  if(qi >= QUESTIONS.length){ final(); }
  else { question(); }
}
intro();
</script>
</body>
</html>
