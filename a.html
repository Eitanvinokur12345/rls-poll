<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>חזו את הממצאים — גרסה A</title>
<style>
  :root{
    --bg:#241812; --bg2:#2e1f15; --card:#3A2A1E; --border:#5A4636;
    --ink:#FBF1E6; --mut:#C9B49E; --acc:#D98A4E; --acc2:#E8A66A; --gold:#FCD34D;
    --green:#7DB892; --red:#E87A6A;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:"Heebo","Segoe UI",system-ui,Arial,sans-serif;color:var(--ink);min-height:100%;
    background:radial-gradient(1200px 800px at 30% -10%, #3a2415 0%, var(--bg) 60%);
    display:flex;align-items:center;justify-content:center;padding:20px;direction:rtl;
  }
  .wrap{width:min(720px,100%)}
  .card{
    background:linear-gradient(180deg,var(--card),#2a1c12);
    border:1.5px solid var(--border);border-radius:22px;padding:32px 28px;
    box-shadow:0 30px 80px rgba(0,0,0,.45);position:relative;overflow:hidden;
  }
  .card::before{content:"";position:absolute;inset:0 0 auto 0;height:4px;
    background:linear-gradient(90deg,var(--acc),var(--acc2),var(--gold))}
  .dots{display:flex;gap:8px;justify-content:center;margin-bottom:22px;direction:ltr}
  .dot{width:9px;height:9px;border-radius:50%;background:#4d3a2a;transition:.3s}
  .dot.on{background:var(--acc);transform:scale(1.3)}
  .dot.done{background:var(--gold)}
  .eyebrow{font-size:12px;letter-spacing:2px;color:var(--acc);font-weight:800;text-align:center;margin-bottom:10px}
  h1{font-size:30px;font-weight:900;line-height:1.25;text-align:center;margin-bottom:10px}
  .sub{color:var(--mut);text-align:center;font-size:16px;margin-bottom:24px;line-height:1.55}
  .q{font-size:24px;font-weight:800;line-height:1.3;text-align:center;margin:8px 0 22px}
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{
    background:#2a1c12;border:1.5px solid var(--border);border-radius:14px;
    padding:16px 18px;font-size:16px;color:var(--ink);text-align:right;cursor:pointer;
    transition:.18s;display:flex;align-items:center;gap:12px;font-weight:600;
    font-family:inherit;
  }
  .opt:hover{border-color:var(--acc);transform:translateY(-2px);background:#3a2818}
  .opt .pill{width:28px;height:28px;border-radius:50%;border:2px solid var(--mut);flex:0 0 auto;
    display:grid;place-items:center;font-size:13px;color:var(--mut);font-weight:800}
  .btn{
    margin-top:22px;background:var(--acc);color:#1a0e07;border:none;border-radius:14px;
    padding:15px 30px;font-size:17px;font-weight:800;cursor:pointer;transition:.18s;width:100%;
    font-family:inherit;
  }
  .btn:hover{filter:brightness(1.08);transform:translateY(-2px)}
  .btn.ghost{background:transparent;color:var(--acc);border:1.5px solid var(--acc)}
  .res-row{display:flex;align-items:center;gap:12px;margin:10px 0;direction:rtl}
  .res-label{width:140px;font-size:13.5px;color:var(--ink);flex:0 0 auto;font-weight:700;text-align:right}
  .bar-track{flex:1;background:#1a0f08;border-radius:9px;height:32px;overflow:hidden;border:1px solid var(--border);direction:ltr}
  .bar-fill{height:100%;width:0;border-radius:9px 0 0 9px;transition:width 1.1s cubic-bezier(.2,.8,.2,1);
    display:flex;align-items:center;justify-content:flex-end;padding-left:10px;font-size:13.5px;
    font-weight:800;color:#1a0e07;direction:ltr}
  .funfact{
    margin-top:22px;background:linear-gradient(180deg,#3a2818,#2a1c12);
    border:1.5px solid var(--gold);border-radius:16px;padding:18px 20px;
  }
  .funfact .tag{font-size:12px;letter-spacing:2px;color:var(--gold);font-weight:800;margin-bottom:8px}
  .funfact p{font-size:16px;line-height:1.6}
  .you-pick{margin-top:14px;font-size:13.5px;color:var(--mut);text-align:center}
  .you-pick b{color:var(--acc)}
  .fade{animation:fade .5s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .final-fact{background:#2a1c12;border:1px solid var(--border);border-right:4px solid var(--gold);
    border-radius:12px;padding:14px 18px;margin:10px 0;font-size:15.5px;line-height:1.5}
  .final-fact b{color:var(--acc)}
  .credit{text-align:center;color:var(--mut);font-size:12px;margin-top:18px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap"><div class="card" id="card"></div></div>
<script>
const BAR = ["#D98A4E","#E8A66A","#C9B49E","#7DB892","#E87A6A"];

const QUESTIONS = [
  {
    q: "מה לדעתכם מנבא הכי הרבה את האושר בזוגיות?",
    options: ["אהבה","כסף","אמונה משותפת","בריאות"],
    chartTitle: "מה המחקר מצא בפועל",
    bars: [["אהבה (לא נמדד)","—"],["כסף (פער הכנסה)",0.20],["אמונה משותפת",0.82],["בריאות (לא נמדד)","—"]],
    unit:"score",
    correct: 2,
    fact: "אמונה משותפת! פער של 0.82 נקודות בשלווה הפנימית בין זוגות דומים מאוד דתית לבין שונים מאוד. זה הפער הגדול ביותר במחקר."
  },
  {
    q: "האם כסף קונה שלווה פנימית?",
    options: ["כן — יותר כסף = יותר שלווה","לא — שלווה לא תלויה בכסף","לא בטוח/ה"],
    chartTitle: "שלווה פנימית לפי הכנסה",
    bars: [["הכנסה נמוכה",3.64],["הכנסה בינונית",3.67],["הכנסה גבוהה",3.57]],
    unit:"score",
    correct: 1,
    fact: "כסף לא קונה שלווה. השלווה הפנימית נשארת קבועה בערך 3.6 בכל רמת הכנסה. כסף כן מעלה אושר ובריאות אבל לא שלווה."
  },
  {
    q: "איזו דת לדעתכם מדווחת על הכי הרבה שלווה פנימית?",
    options: ["יהדות","אסלאם","נצרות","מורמונים","חסרי דת"],
    chartTitle: "שלווה פנימית לפי דת",
    bars: [["יהדות",3.23],["אסלאם",4.37],["נצרות (קתולים)",3.69],["מורמונים",4.48],["חסרי דת",2.95]],
    unit:"score",
    correct: 3,
    fact: "המורמונים מובילים עם 4.48 נקודות שלווה. אחריהם המוסלמים (4.37). הכי נמוך — חסרי הדת (2.95). פער של 1.5 נקודות מהקצה לקצה."
  },
  {
    q: "מי לדעתכם מאושר יותר היום — דור צעיר או מבוגר?",
    options: ["דור צעיר (Gen Z, מילניאלס)","דור מבוגר (בייבי בומרס, השקט)"],
    chartTitle: "אושר ושלווה לפי דור",
    bars: [["דור השקט — אושר",2.20],["דור Z — אושר",2.10],["דור השקט — שלווה",3.80],["דור Z — שלווה",3.53]],
    unit:"score",
    correct: 1,
    fact: "מפתיע — המבוגרים מאושרים יותר ושלווים יותר. הצעירים דווקא מרוצים יותר מהחיים שלהם. כל דור מצא מסלול אחר לרווחה."
  },
  {
    q: "כששני בני הזוג דתיים מאוד, השלווה הפנימית שלהם...",
    options: ["גבוהה הרבה יותר","בערך אותו דבר","נמוכה יותר"],
    chartTitle: "שלווה פנימית לפי דתיות הזוג",
    bars: [["שניהם דתיים",4.53],["מעורב",3.49],["שניהם חילונים",2.81]],
    unit:"score",
    correct: 0,
    fact: "גבוהה משמעותית! זוגות ששניהם דתיים מאוד מגיעים ל-4.53 שלווה. זוגות ששניהם חילונים — רק 2.81. פער ענק של 1.72 נקודות."
  },
  {
    q: "איזה ממצא ירשים אתכם הכי הרבה?",
    options: ["שדמיון דתי מנבא רווחה","שכסף לא משפיע על שלווה","שהאפקט עקבי בכל הדורות","שהאפקט עקבי בכל הרמות הכלכליות"],
    chartTitle: "הממצאים המרכזיים של המחקר",
    bars: [["פער דמיון דתי",0.82],["פער הכנסה (שלווה)",0.03],["פער דור צעיר/מבוגר",0.27],["פער דמיון בעוני",0.85]],
    unit:"score",
    correct: -1,
    fact: "כל הממצאים מדהימים בדרכם — אבל המסר הגדול אחד: כשבני הזוג מאמינים יחד, הם חיים טוב יותר יחד. בכל גיל, בכל הכנסה, בכל דת."
  }
];

let qi = -1;
const card = document.getElementById('card');

function dots(active){
  let h='<div class="dots">';
  for(let i=0;i<QUESTIONS.length;i++){
    let cls = i<active ? 'done' : (i===active ? 'on' : '');
    h+=`<div class="dot ${cls}"></div>`;
  }
  return h+'</div>';
}

function intro(){
  card.innerHTML = `
    ${dots(-1)}
    <div class="eyebrow fade">PEW RESEARCH · 36,908 נשאלים</div>
    <h1 class="fade">חזו את הממצאים</h1>
    <p class="sub fade">6 שאלות. בכל אחת תנסו לנחש מה החוקרים גילו — ואז תראו את התשובה האמיתית.</p>
    <button class="btn fade" onclick="next()">בואו נתחיל</button>
    <div class="credit">פרויקט NAMELESS · תחרות מדעי הנתונים 2026</div>
  `;
}

function question(){
  const Q = QUESTIONS[qi];
  let opts = Q.options.map((o,i)=>`
    <button class="opt" onclick="answer(${i})">
      <span class="pill">${["א","ב","ג","ד","ה"][i]}</span>${o}
    </button>`).join('');
  card.innerHTML = `
    ${dots(qi)}
    <div class="eyebrow fade">שאלה ${qi+1} מתוך ${QUESTIONS.length}</div>
    <div class="q fade">${Q.q}</div>
    <div class="opts fade">${opts}</div>
  `;
}

function answer(choiceIdx){
  const Q = QUESTIONS[qi];
  const numericBars = Q.bars.filter(b => typeof b[1] === 'number');
  const max = Math.max(...numericBars.map(b => b[1]));
  let rows = Q.bars.map((b,i)=>{
    const isNum = typeof b[1] === 'number';
    const w = isNum ? Math.round(100*b[1]/max) : 0;
    const val = isNum ? b[1].toFixed(2) : b[1];
    const color = (Q.correct === i) ? 'var(--gold)' : BAR[i % BAR.length];
    return `<div class="res-row">
      <div class="res-label">${b[0]}</div>
      <div class="bar-track"><div class="bar-fill" data-w="${w}" style="background:${color}">${val}</div></div>
    </div>`;
  }).join('');
  const youPickedRight = (Q.correct === choiceIdx);
  const youLine = Q.correct >= 0
    ? `<div class="you-pick fade">בחרת <b>${Q.options[choiceIdx]}</b>. ${youPickedRight ? 'צדקת! ✨' : 'התשובה הנכונה: ' + Q.options[Q.correct]}</div>`
    : `<div class="you-pick fade">בחרת <b>${Q.options[choiceIdx]}</b>.</div>`;
  const last = qi === QUESTIONS.length-1;
  card.innerHTML = `
    ${dots(qi+1)}
    <div class="eyebrow fade">${Q.chartTitle}</div>
    <div class="fade" style="margin-top:8px">${rows}</div>
    <div class="funfact fade">
      <div class="tag">העובדה האמיתית</div>
      <p>${Q.fact}</p>
    </div>
    ${youLine}
    <button class="btn fade" onclick="next()">${last ? 'לסיכום' : 'שאלה הבאה'}</button>
  `;
  requestAnimationFrame(()=>setTimeout(()=>{
    document.querySelectorAll('.bar-fill').forEach(el=>{
      el.style.width = el.dataset.w + '%';
    });
  },150));
}

function final(){
  card.innerHTML = `
    ${dots(QUESTIONS.length)}
    <div class="eyebrow fade">סיכום הממצאים</div>
    <h1 class="fade" style="font-size:26px">שלושה דברים לזכור</h1>
    <div class="fade" style="margin-top:18px">
      <div class="final-fact">זוגות שחולקים <b>אמונה דומה</b> מדווחים על אושר, בריאות ושלווה גבוהים יותר.</div>
      <div class="final-fact"><b>השלווה הפנימית</b> מרוויחה הכי הרבה מאמונה משותפת — פער של 0.82 נקודות.</div>
      <div class="final-fact"><b>כסף</b> מעלה אושר ובריאות אבל לא משפיע על השלווה הפנימית.</div>
    </div>
    <div class="funfact fade" style="border-color:var(--green)">
      <div class="tag" style="color:var(--green)">המחשבה הסוגרת</div>
      <p>"כשמאמינים יחד — חיים טוב יותר יחד."</p>
    </div>
    <button class="btn ghost fade" onclick="qi=-1;next()">להתחיל מחדש</button>
    <div class="credit">Pew Religious Landscape Study 2023 to 2024<br>n = 36,908 · ממוצעים משוקללים</div>
  `;
}

function next(){
  qi++;
  if(qi >= QUESTIONS.length){ final(); }
  else { question(); }
}
intro();
</script>
</body>
</html>
